name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Build with a current, security-patched toolchain rather than the
          # go.mod minimum: `go 1.23` is the floor for `go install` users, but
          # that release no longer receives security fixes.
          go-version: stable
          check-latest: true
          cache-dependency-path: go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:" >&2
            echo "$unformatted" >&2
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race ./...

      - name: Cross-compile release targets
        run: |
          set -euo pipefail
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64; do
            GOOS="${target%/*}" GOARCH="${target#*/}" go build -o /dev/null ./cmd/celeris
            echo "built $target"
          done

  compat:
    name: compat (go.mod floor)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # The oldest toolchain the go.mod directive promises to support. The
          # other jobs build with `stable`, so without this the floor could
          # break for `go install` users without anyone noticing.
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Build and test at the minimum supported Go
        run: |
          go build ./...
          go test ./...

  vulncheck:
    name: vulncheck
    runs-on: ubuntu-latest
    # Advisory, not blocking: standard-library advisories land independently of
    # anything in this repo, and should not turn an unrelated pull request red.
    # Flip this off to make vulnerabilities gate merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Build with a current, security-patched toolchain rather than the
          # go.mod minimum: `go 1.23` is the floor for `go install` users, but
          # that release no longer receives security fixes.
          go-version: stable
          check-latest: true
          cache-dependency-path: go.sum

      # Pinned rather than @latest so a bad release cannot silently change
      # what runs in CI.
      - name: Scan dependencies for known vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...

  goreleaser-check:
    name: goreleaser-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: check
