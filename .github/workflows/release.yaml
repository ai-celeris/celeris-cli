name: Release

# Tag-driven release: pushing a v* tag builds multi-OS binaries, publishes a
# GitHub release with archives + checksums, and pushes the Homebrew cask to
# ai-celeris/homebrew-tools. HOMEBREW_TAP_TOKEN must be a PAT with
# Contents: write on that tap repo.
#
# Third-party actions are pinned to full commit SHAs, not tags: this job holds
# a cross-repo PAT, and a retagged action would otherwise be able to read it.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release and upload archives
      id-token: write # keyless signing / provenance, if enabled later
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          # Build with a current, security-patched toolchain rather than the
          # go.mod minimum: `go 1.23` is the floor for `go install` users, but
          # that release no longer receives security fixes.
          go-version: stable
          check-latest: true
          cache-dependency-path: go.sum

      - name: Test before release
        run: go test -race ./...

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
