version: 2

updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      go-dependencies:
        patterns: ["*"]

  # Actions are pinned to commit SHAs; dependabot rewrites both the SHA and
  # the trailing version comment, so pinning stays maintainable.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
